name: scheduled-sourcing-rank

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"
    - cron: "0 0 1 * *"

permissions:
  contents: write

jobs:
  scheduled-sourcing-rank:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Korean fonts for Telegram image
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sourcing ranker
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NAVER_SEARCHAD_API_KEY: ${{ secrets.NAVER_SEARCHAD_API_KEY }}
          NAVER_SEARCHAD_SECRET_KEY: ${{ secrets.NAVER_SEARCHAD_SECRET_KEY }}
          NAVER_SEARCHAD_CUSTOMER_ID: ${{ secrets.NAVER_SEARCHAD_CUSTOMER_ID }}
        run: python sourcing_ranker.py --input "브랜드&키워드 300개.xlsx" --limit 20 --top 30 --discover-products --products-only --product-seed-limit 10 --product-keywords-per-brand 5 --min-product-volume 500 --max-product-candidates 50

      - name: Check generated reports
        if: always()
        run: |
          echo "Current directory:"
          pwd
          echo "Root files:"
          ls -la
          echo "Reports:"
          ls -la reports || echo "reports folder not found"
          echo "Dashboard data:"
          ls -la dashboard_data || echo "dashboard_data folder not found"

      - name: Prepare dashboard data
        if: success() && hashFiles('reports/*.xlsx') != ''
        run: python update_dashboard_data.py

      - name: Notify report
        if: success() && hashFiles('reports/*.xlsx') != ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash' }}

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          SEND_TELEGRAM_IMAGE: "true"

          REPORT_WEBHOOK_URL: ${{ secrets.REPORT_WEBHOOK_URL }}

          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          REPORT_FROM_EMAIL: ${{ secrets.REPORT_FROM_EMAIL }}
          REPORT_TO_EMAIL: ${{ secrets.REPORT_TO_EMAIL }}
          REPORT_EMAIL_SUBJECT: 네이버 해외직구 소싱 자동 리포트
        run: python notify_report.py --top 15 --image-top 10

      - name: Commit dashboard data
        if: success() && hashFiles('dashboard_data/latest_sourcing_rank.xlsx') != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git status
          git add dashboard_data/

          git diff --cached --quiet && echo "No dashboard data changes" && exit 0

          git commit -m "Update dashboard data"
          git pull --rebase
          git push

      - name: Upload Excel report
        if: always() && hashFiles('reports/*.xlsx') != ''
        uses: actions/upload-artifact@v4
        with:
          name: sourcing-rank-report
          path: |
            reports/*.xlsx
            reports/*.csv
            reports/*.png
          retention-days: 30
